<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 240" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&amp;display=swap');
      .logo-text {
        font-family: 'Fredoka', 'Quicksand', 'Nunito', 'Inter', sans-serif;
        font-weight: 700;
        fill: #2d512e;
      }
      .logo-subtitle {
        font-family: 'Fredoka', 'Outfit', 'Inter', sans-serif;
        font-weight: 500;
        fill: #7c8e7c;
        letter-spacing: 0.3em;
      }
    </style>
  </defs>

  <!-- Background is transparent -->

  <g transform="translate(10, 10)">
    <!-- Capital 'D' in Domo -->
    <path d="M 65,30 H 125 C 175,30 205,60 205,100 V 100 C 205,140 175,170 125,170 H 65 C 55,170 50,165 50,155 V 45 C 50,35 55,30 65,30 Z" fill="#2d512e" />

    <!-- White dog silhouette inside the 'D' -->
    <path d="M 50,168 C 65,165 78,160 85,152 C 92,144 95,133 98,123 C 101,113 100,103 97,98 C 93,91 88,86 92,81 C 96,76 106,71 110,81 C 112,76 117,73 124,76 C 129,78 128,83 124,87 C 128,89 131,93 129,97 C 126,101 119,103 114,105 C 116,108 123,111 130,113 C 133,114 136,111 138,114 C 139,116 136,119 131,120 C 122,121 117,119 113,124 C 111,131 112,139 116,146 C 119,151 123,155 128,157 L 128,168 Z" fill="#ffffff" />

    <!-- White heart inside the 'D' -->
    <path d="M 152,65 C 152,65 142,53 142,46 C 142,40 147,35 152,35 C 156,35 159,38 161,41 C 163,38 166,35 170,35 C 175,35 180,40 180,46 C 180,53 170,65 170,65 Z" fill="#ffffff" transform="rotate(-15, 152, 65)" />

    <!-- Lowercase letters 'omo' next to the 'D' -->
    <text x="210" y="162" font-size="142" class="logo-text">omo</text>

    <!-- Subtitle: — SISTEMA PET — -->
    <text x="272" y="212" font-size="24" text-anchor="middle" class="logo-subtitle">— SISTEMA PET —</text>
  </g>
</svg>
